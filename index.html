<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seat Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg: #E7E2D3;
    --paper: #FBF7EC;
    --ink: #211D16;
    --muted: #8A8069;
    --stamp: #B5423A;
    --success: #3F6B4A;
    --line: #CFC5AA;
    --shadow: 0 1px 0 rgba(33,29,22,0.06), 0 8px 24px -12px rgba(33,29,22,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 28px 16px 60px;
  }
  .wrap{ max-width: 640px; margin: 0 auto; }

  /* header */
  .masthead{
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 14px;
    margin-bottom: 22px;
  }
  .masthead h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size: 26px;
    letter-spacing: -0.01em;
    margin:0;
  }
  .masthead .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display:block;
    margin-bottom: 2px;
  }
  .cap-pill{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* tabs */
  .tabs{
    display:flex; gap: 6px; margin-bottom: 24px;
  }
  .tab{
    flex:1;
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align:center;
    padding: 10px 6px;
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }
  .tab.active{ background: var(--ink); color: var(--paper); }
  .tab:not(.active):hover{ background: rgba(33,29,22,0.06); }

  .panel{ display:none; }
  .panel.active{ display:block; animation: fade .2s ease; }
  @keyframes fade{ from{opacity:0; transform: translateY(4px);} to{opacity:1; transform:none;} }

  /* card */
  .card{
    background: var(--paper);
    border: 1px solid var(--ink);
    box-shadow: var(--shadow);
    padding: 24px;
  }
  .card + .card{ margin-top: 18px; }

  label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 16px;
  }
  label:first-of-type{ margin-top:0; }
  input, textarea{
    width:100%;
    font-family:'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--line);
    padding: 8px 2px;
    outline: none;
    transition: border-color .15s ease;
  }
  input:focus, textarea:focus{ border-bottom-color: var(--ink); }
  textarea{ resize: vertical; min-height: 44px; font-family:'Inter',sans-serif; }

  .btn{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--ink);
    padding: 13px 20px;
    cursor: pointer;
    width:100%;
    margin-top: 22px;
    transition: opacity .15s ease;
  }
  .btn:hover{ opacity: 0.85; }
  .btn:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn.ghost{
    background: transparent;
    color: var(--ink);
  }
  .btn.small{ width:auto; padding: 9px 14px; margin-top:0; font-size:11px; }

  .err{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--stamp);
    margin-top: 10px;
  }
  .hint{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ticket stub — signature element */
  .ticket{
    position: relative;
    background: var(--paper);
    border: 1px solid var(--ink);
    box-shadow: var(--shadow);
    overflow: visible;
  }
  .ticket-top{
    padding: 22px 24px 20px;
  }
  .ticket-top .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 4px;
  }
  .ticket-top h2{
    font-family:'Fraunces', serif;
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 10px;
  }
  .ticket-meta{
    display:flex; flex-wrap:wrap; gap: 4px 18px;
    font-size: 13px; color: var(--muted);
  }
  .ticket-meta span b{ color:var(--ink); font-weight:500; }

  .perf{
    position: relative;
    height: 0;
    border-top: 2px dashed var(--line);
    margin: 0 0;
  }
  .perf::before, .perf::after{
    content:"";
    position:absolute;
    top:-11px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--bg);
  }
  .perf::before{ left: -33px; }
  .perf::after{ right: -33px; }

  .ticket-bottom{
    padding: 22px 24px 24px;
    display:flex; align-items:center; justify-content:space-between; gap: 18px;
  }
  .seat-block .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 2px;
  }
  .seat-number{
    font-family:'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 34px;
    color: var(--stamp);
    letter-spacing: -0.02em;
    line-height:1;
  }
  .code-line{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }
  .qr-box{
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 6px;
    line-height:0;
  }
  .stamp-badge{
    position:absolute;
    top: 18px; right: 20px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--success);
    border: 1.5px solid var(--success);
    padding: 3px 8px;
    transform: rotate(6deg);
  }

  /* scan mode */
  .scan-video-wrap{
    position: relative;
    background: var(--ink);
    aspect-ratio: 1/1;
    overflow: hidden;
    border: 1px solid var(--ink);
  }
  .scan-video-wrap video{
    width:100%; height:100%; object-fit: cover;
    display:block;
  }
  .scan-frame{
    position:absolute; inset: 14%;
    border: 2px solid var(--paper);
    opacity: 0.85;
    pointer-events:none;
  }
  .scan-status{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align:center;
    margin-top: 12px;
  }

  /* guest list */
  table{ width:100%; border-collapse: collapse; font-size: 13px; }
  th{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-align:left;
    padding: 8px 6px;
    border-bottom: 1.5px solid var(--ink);
  }
  td{
    padding: 10px 6px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  td.mono, th.mono{ font-family:'IBM Plex Mono', monospace; }
  .status-yes{ color: var(--success); font-weight:600; }
  .status-no{ color: var(--muted); }
  .stats-row{
    display:flex; gap: 20px; margin-bottom: 18px; flex-wrap: wrap;
  }
  .stat{
    font-family:'IBM Plex Mono', monospace;
  }
  .stat .num{ font-size: 22px; font-weight:600; }
  .stat .lbl{ font-size: 10px; color: var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
  .row-inline{ display:flex; gap: 10px; align-items: flex-end; }
  .row-inline > div{ flex:1; }
  .search-input{ margin-bottom: 16px; }
  .empty{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    padding: 20px 0;
    text-align:center;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div>
      <span class="eyebrow">Event Seating</span>
      <h1 id="eventTitle">Seat Planner</h1>
    </div>
    <div class="cap-pill" id="capPill">— / —</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-panel="register">Register</button>
    <button class="tab" data-panel="scan">Scan</button>
    <button class="tab" data-panel="guests">Guests</button>
  </div>

  <!-- REGISTER -->
  <div class="panel active" id="panel-register">
    <div class="card" id="registerFormCard">
      <label for="gName">Full name</label>
      <input id="gName" type="text" placeholder="Juan Dela Cruz" />

      <label for="gEmail">Email</label>
      <input id="gEmail" type="email" placeholder="juan@email.com" />

      <label for="gPhone">Phone</label>
      <input id="gPhone" type="text" placeholder="09xx xxx xxxx" />

      <label for="gNotes">Notes <span style="text-transform:none;">(dietary, accessibility, etc. — optional)</span></label>
      <textarea id="gNotes" placeholder="Optional"></textarea>

      <button class="btn" id="registerBtn">Reserve seat</button>
      <div class="err" id="registerErr" style="display:none;"></div>
    </div>

    <div id="ticketResultWrap"></div>
  </div>

  <!-- SCAN -->
  <div class="panel" id="panel-scan">
    <div class="card">
      <label style="margin-top:0;">Organizer check-in</label>
      <div class="scan-video-wrap" id="scanVideoWrap">
        <video id="scanVideo" playsinline muted></video>
        <div class="scan-frame"></div>
      </div>
      <button class="btn" id="scanToggleBtn">Start camera</button>
      <div class="scan-status" id="scanStatus">Camera is off.</div>

      <label for="manualCodeInput">Or enter code manually</label>
      <div class="row-inline">
        <div><input id="manualCodeInput" type="text" placeholder="EVT-XXXXXXXX" style="text-transform:uppercase;" /></div>
        <button class="btn small" id="manualLookupBtn">Look up</button>
      </div>
    </div>
    <div id="scanResultWrap"></div>
  </div>

  <!-- GUESTS -->
  <div class="panel" id="panel-guests">
    <div class="card">
      <div class="stats-row">
        <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">Registered</div></div>
        <div class="stat"><div class="num" id="statCap">0</div><div class="lbl">Capacity</div></div>
        <div class="stat"><div class="num" id="statChecked">0</div><div class="lbl">Checked in</div></div>
      </div>
      <div class="row-inline">
        <div>
          <label style="margin-top:0;">Total seats</label>
          <input id="capacityInput" type="number" min="1" />
        </div>
        <button class="btn small" id="saveCapBtn">Save</button>
      </div>
      <div class="hint">Lowering capacity below the number already registered will not remove existing guests.</div>
    </div>

    <div class="card">
      <input class="search-input" id="searchInput" type="text" placeholder="Search by name, seat, or code…" />
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th class="mono">Seat</th>
              <th>Name</th>
              <th>Contact</th>
              <th class="mono">Code</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="guestTableBody"></tbody>
        </table>
      </div>
      <div class="empty" id="guestEmpty" style="display:none;">No guests registered yet.</div>
    </div>
  </div>

</div>

<script>
(function(){
  // ============================================================
  // PASTE YOUR FIREBASE CONFIG HERE (from Firebase console ->
  // Project settings -> Your apps -> Web app -> SDK setup snippet)
  // ============================================================
  const firebaseConfig = {
    apiKey: "PASTE_YOUR_API_KEY",
    authDomain: "PASTE_YOUR_PROJECT.firebaseapp.com",
    projectId: "PASTE_YOUR_PROJECT_ID",
    storageBucket: "PASTE_YOUR_PROJECT.appspot.com",
    messagingSenderId: "PASTE_YOUR_SENDER_ID",
    appId: "PASTE_YOUR_APP_ID"
  };
  // ============================================================

  let db = null;
  let docRef = null;
  let firebaseReady = false;
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    docRef = db.collection('seatPlanner').doc('state');
    firebaseReady = true;
  } catch(e){
    console.error('Firebase failed to initialize. Did you paste your config?', e);
  }

  let state = null; // { totalSeats, nextSeatNumber, guests: [...] }
  let scanning = false;
  let scanStream = null;
  let scanRAF = null;

  function defaultState(){
    return { totalSeats: 100, nextSeatNumber: 1, guests: [] };
  }

  async function loadState(){
    if(!firebaseReady){
      state = defaultState();
      return;
    }
    try{
      const snap = await docRef.get();
      if(snap.exists){
        state = snap.data();
      } else {
        state = defaultState();
        await docRef.set(state);
      }
    } catch(e){
      console.error('Load failed', e);
      state = defaultState();
    }
    if(!state.guests) state.guests = [];
    if(!state.totalSeats) state.totalSeats = 100;
    if(!state.nextSeatNumber) state.nextSeatNumber = 1;
  }

  async function saveState(){
    if(!firebaseReady){
      throw new Error('Firebase is not configured yet.');
    }
    await docRef.set(state);
  }

  // fresh copy right before a mutation, to minimize collision window with other devices
  async function refreshBeforeWrite(){
    if(!firebaseReady) return;
    try{
      const snap = await docRef.get();
      if(snap.exists){
        const fresh = snap.data();
        state.totalSeats = fresh.totalSeats;
        state.nextSeatNumber = fresh.nextSeatNumber;
        state.guests = fresh.guests || [];
      }
    } catch(e){ /* fine, use in-memory state */ }
  }

  function genCode(){
    const a = Math.random().toString(36).slice(2,6).toUpperCase();
    const b = Date.now().toString(36).slice(-4).toUpperCase();
    return 'EVT-' + a + b;
  }

  function esc(s){
    return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function seatLabelFor(n){
    return 'Seat ' + String(n).padStart(3,'0');
  }

  // ---------- tabs ----------
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
      if(tab.dataset.panel === 'guests'){ renderGuestTable(); }
      if(tab.dataset.panel !== 'scan'){ stopScanning(); }
    });
  });

  // ---------- register ----------
  document.getElementById('registerBtn').addEventListener('click', async () => {
    const errEl = document.getElementById('registerErr');
    errEl.style.display = 'none';
    const name = document.getElementById('gName').value.trim();
    const email = document.getElementById('gEmail').value.trim();
    const phone = document.getElementById('gPhone').value.trim();
    const notes = document.getElementById('gNotes').value.trim();

    if(!name){
      errEl.textContent = 'Name is required.';
      errEl.style.display = 'block';
      return;
    }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.textContent = 'Reserving…';

    try{
      await refreshBeforeWrite();

      if(state.nextSeatNumber > state.totalSeats){
        errEl.textContent = 'All ' + state.totalSeats + ' seats are taken.';
        errEl.style.display = 'block';
        return;
      }

      let code = genCode();
      while(state.guests.some(g => g.code === code)){ code = genCode(); }

      const seatNum = state.nextSeatNumber;
      const guest = {
        code,
        name,
        email,
        phone,
        notes,
        seatNumber: seatNum,
        seatLabel: seatLabelFor(seatNum),
        checkedIn: false,
        checkedInAt: null,
        registeredAt: new Date().toISOString()
      };

      state.guests.push(guest);
      state.nextSeatNumber = seatNum + 1;

      await saveState();
      renderTicket(guest, 'ticketResultWrap', false);

      document.getElementById('gName').value = '';
      document.getElementById('gEmail').value = '';
      document.getElementById('gPhone').value = '';
      document.getElementById('gNotes').value = '';
      updateCapPill();
    } catch(e){
      errEl.textContent = 'Could not save. Check your connection and try again.';
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Reserve seat';
    }
  });

  function renderTicket(guest, containerId, checkedInMode){
    const wrap = document.getElementById(containerId);
    const contactBits = [];
    if(guest.email) contactBits.push(guest.email);
    if(guest.phone) contactBits.push(guest.phone);

    wrap.innerHTML = `
      <div class="ticket" style="margin-top:18px;">
        ${checkedInMode && guest.checkedIn ? '<div class="stamp-badge">Checked in</div>' : ''}
        <div class="ticket-top">
          <p class="eyebrow">Admission ticket</p>
          <h2>${esc(guest.name)}</h2>
          <div class="ticket-meta">
            ${contactBits.map(c => `<span>${esc(c)}</span>`).join('')}
          </div>
          ${guest.notes ? `<div class="ticket-meta" style="margin-top:6px;"><span>${esc(guest.notes)}</span></div>` : ''}
        </div>
        <div class="perf"></div>
        <div class="ticket-bottom">
          <div class="seat-block">
            <p class="eyebrow">Assigned seat</p>
            <div class="seat-number">${esc(guest.seatLabel)}</div>
            <div class="code-line">${esc(guest.code)}</div>
          </div>
          <div class="qr-box" id="qr-${guest.code}"></div>
        </div>
      </div>
      ${!checkedInMode ? '<button class="btn ghost" id="registerAnotherBtn">Register another guest</button>' : ''}
    `;

    const qrEl = document.getElementById('qr-' + guest.code);
    if(qrEl && window.QRCode){
      new QRCode(qrEl, {
        text: guest.code,
        width: 160,
        height: 160,
        colorDark: '#211D16',
        colorLight: '#FBF7EC'
      });
    }

    if(!checkedInMode){
      const again = document.getElementById('registerAnotherBtn');
      if(again){
        again.addEventListener('click', () => {
          wrap.innerHTML = '';
        });
      }
    }
  }

  function updateCapPill(){
    const registered = state.guests.length;
    document.getElementById('capPill').textContent = registered + ' / ' + state.totalSeats + ' seats';
  }

  // ---------- scan ----------
  const scanToggleBtn = document.getElementById('scanToggleBtn');
  scanToggleBtn.addEventListener('click', () => {
    if(scanning){ stopScanning(); } else { startScanning(); }
  });

  document.getElementById('manualLookupBtn').addEventListener('click', () => {
    const val = document.getElementById('manualCodeInput').value.trim().toUpperCase();
    if(!val) return;
    handleScanResult(val);
  });
  document.getElementById('manualCodeInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){ document.getElementById('manualLookupBtn').click(); }
  });

  async function startScanning(){
    const statusEl = document.getElementById('scanStatus');
    document.getElementById('scanResultWrap').innerHTML = '';

    if(!window.jsQR){
      statusEl.textContent = 'Scanner library failed to load — check your internet connection, or use manual entry below.';
      return;
    }
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      statusEl.textContent = 'This browser does not support camera access here. Try Chrome/Safari, or use manual entry below.';
      return;
    }
    if(!window.isSecureContext){
      statusEl.textContent = 'Camera requires a secure (https://) page. Use manual entry below, or open this over https.';
      return;
    }

    statusEl.textContent = 'Requesting camera permission…';

    try{
      try{
        scanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
      } catch(e1){
        // some laptops/devices have no rear camera — fall back to any camera
        scanStream = await navigator.mediaDevices.getUserMedia({ video: true });
      }

      const video = document.getElementById('scanVideo');
      video.srcObject = scanStream;
      await video.play();

      scanning = true;
      scanToggleBtn.textContent = 'Stop camera';
      statusEl.textContent = 'Point the camera at a guest\'s QR code…';

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      let frameCount = 0;

      function tick(){
        if(!scanning) return;
        if(video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0){
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const result = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
          frameCount++;
          if(result && result.data){
            handleScanResult(result.data.trim());
            return;
          }
        }
        scanRAF = requestAnimationFrame(tick);
      }
      scanRAF = requestAnimationFrame(tick);

    } catch(e){
      console.error('Camera start failed', e);
      let msg = 'Could not start the camera.';
      if(e && e.name === 'NotAllowedError') msg = 'Camera permission was denied. Check your browser/site settings and try again.';
      else if(e && e.name === 'NotFoundError') msg = 'No camera was found on this device.';
      else if(e && e.name === 'NotReadableError') msg = 'Camera is already in use by another app.';
      statusEl.textContent = msg + ' You can also use manual entry below.';
      stopScanning();
    }
  }

  function stopScanning(){
    scanning = false;
    if(scanRAF) cancelAnimationFrame(scanRAF);
    if(scanStream){
      scanStream.getTracks().forEach(t => t.stop());
      scanStream = null;
    }
    scanToggleBtn.textContent = 'Start camera';
    const statusEl = document.getElementById('scanStatus');
    if(statusEl.textContent.indexOf('Checked in') === -1 && statusEl.textContent.indexOf('Already checked in') === -1){
      statusEl.textContent = 'Camera is off.';
    }
  }

  async function handleScanResult(code){
    stopScanning();
    const statusEl = document.getElementById('scanStatus');
    statusEl.textContent = 'Looking up ' + code + '…';

    try{
      await refreshBeforeWrite();
    } catch(e){ /* use in-memory state */ }

    const guest = state.guests.find(g => g.code === code);
    if(!guest){
      document.getElementById('scanResultWrap').innerHTML = `
        <div class="card" style="border-color:var(--stamp);">
          <p style="font-family:'IBM Plex Mono',monospace; color:var(--stamp); margin:0;">
            No guest found for code ${esc(code)}. This QR may not belong to this event.
          </p>
        </div>`;
      statusEl.textContent = 'Scan another guest when ready.';
      return;
    }

    const wasCheckedIn = guest.checkedIn;
    if(!wasCheckedIn){
      guest.checkedIn = true;
      guest.checkedInAt = new Date().toISOString();
      try{ await saveState(); } catch(e){ /* show result anyway */ }
    }

    document.getElementById('manualCodeInput').value = '';
    renderTicket(guest, 'scanResultWrap', true);
    statusEl.textContent = wasCheckedIn
      ? 'Already checked in earlier — seat shown above.'
      : 'Checked in. Direct them to their seat above.';
  }

  // ---------- guests / admin ----------
  document.getElementById('saveCapBtn').addEventListener('click', async () => {
    const val = parseInt(document.getElementById('capacityInput').value, 10);
    if(!val || val < 1) return;
    const btn = document.getElementById('saveCapBtn');
    btn.disabled = true;
    try{
      await refreshBeforeWrite();
      state.totalSeats = val;
      await saveState();
      updateCapPill();
      renderGuestTable();
    } finally {
      btn.disabled = false;
    }
  });

  document.getElementById('searchInput').addEventListener('input', renderGuestTable);

  function renderGuestTable(){
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const tbody = document.getElementById('guestTableBody');
    const emptyEl = document.getElementById('guestEmpty');

    let list = state.guests.slice().sort((a,b) => a.seatNumber - b.seatNumber);
    if(q){
      list = list.filter(g =>
        g.name.toLowerCase().includes(q) ||
        g.seatLabel.toLowerCase().includes(q) ||
        g.code.toLowerCase().includes(q)
      );
    }

    document.getElementById('statTotal').textContent = state.guests.length;
    document.getElementById('statCap').textContent = state.totalSeats;
    document.getElementById('statChecked').textContent = state.guests.filter(g=>g.checkedIn).length;
    document.getElementById('capacityInput').value = state.totalSeats;

    if(list.length === 0){
      tbody.innerHTML = '';
      emptyEl.style.display = 'block';
      return;
    }
    emptyEl.style.display = 'none';

    tbody.innerHTML = list.map(g => `
      <tr>
        <td class="mono">${esc(g.seatLabel)}</td>
        <td>${esc(g.name)}</td>
        <td>${[esc(g.email), esc(g.phone)].filter(Boolean).join('<br>')}</td>
        <td class="mono">${esc(g.code)}</td>
        <td class="${g.checkedIn ? 'status-yes' : 'status-no'}">${g.checkedIn ? 'Checked in' : 'Not yet'}</td>
      </tr>
    `).join('');
  }

  // ---------- init ----------
  (async function init(){
    if(!firebaseReady || firebaseConfig.apiKey.indexOf('PASTE_YOUR') === 0){
      const warn = document.createElement('div');
      warn.className = 'card';
      warn.style.borderColor = 'var(--stamp)';
      warn.style.marginBottom = '18px';
      warn.innerHTML = `<p style="font-family:'IBM Plex Mono',monospace; color:var(--stamp); margin:0; font-size:13px;">
        Setup needed: open this file's code and paste your Firebase project config
        near the top of the &lt;script&gt; tag, replacing the PASTE_YOUR_... placeholders.
        Until then, registrations won't save.
      </p>`;
      document.querySelector('.wrap').insertBefore(warn, document.querySelector('.tabs'));
    }
    await loadState();
    updateCapPill();
    document.getElementById('capacityInput').value = state.totalSeats;
    renderGuestTable();
  })();

})();
</script>
</body>
</html>
